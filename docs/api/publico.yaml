openapi: 3.1.0
info:
  title: Taketrip API — Endpoints PÚBLICOS
  version: 0.2.0
  description: >
    TODOS os endpoints deste arquivo são PÚBLICOS (sem JWT) e anotados com
    @Public() no NestJS — cada um é revisado individualmente (skill
    multi-tenancy). São as ÚNICAS exceções ao escopo por organização:
    a página da excursão (H3.1), a reserva do passageiro (H3.2) e o webhook
    PIX (H2.3). Nenhuma resposta expõe dado de passageiro de terceiros.


    RESOLUÇÃO DE TENANT SEM JWT (ver ADR 008): nestas rotas o
    `TenantContext` (AsyncLocalStorage, ADR 003) NUNCA é populado —
    `organizacao_id` nunca vem de payload nem de contexto ambiente.
    Cada rota resolve o tenant a partir de uma chave de capacidade opaca
    lida do próprio banco: `codigo_publico` da excursão (rotas
    `/publico/excursoes/{codigo}*`) ou o UUID v7 da reserva, que funciona
    como token de posse (`/publico/reservas/{reservaId}`) — mesmo padrão já
    usado por `redefinir-senha` em identity (token opaco → resolve
    organização a partir da própria linha, nunca do cliente).


    RATE LIMITING por IP (`@nestjs/throttler`, em memória — processo único
    na VPS, sem Redis): leituras (`GET /publico/excursoes/{codigo}` e
    `.../mapa-poltronas`) 30 req/min; criação de reserva (`POST
    .../reservas`) 5 req/min — a garantia de corretude contra dupla-reserva
    é sempre a UNIQUE do banco (`reserva_excursao_poltrona_ativa_uq`), o
    rate limit só evita ruído/abuso, não substitui a constraint; consulta de
    situação (`GET /publico/reservas/{reservaId}`) 60 req/min (a tela de
    confirmação faz polling curto). Todo 429 usa o mesmo envelope de erro
    (`MuitasTentativasException`, `common/domain-exception.ts`) com
    `Retry-After`.
servers:
  - url: /api/v1

paths:
  /publico/excursoes/{codigo}:
    get:
      summary: Página pública da excursão (H3.1) — PÚBLICO
      description: >
        Lookup por `codigo_publico` (curto, não sequencial — não expõe UUID
        interno). Só excursão `publicada`/`lotada` responde 200; rascunho,
        cancelada, em andamento ou concluída respondem 404 "indisponível".
        Sem NENHUM dado de passageiro. Cabeçalhos de cache curtos (60s) para
        abrir rápido em 4G; metadados OpenGraph (título + imagem) são
        renderizados pelo frontend com estes dados.
      security: []
      parameters:
        - { name: codigo, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExcursaoPublica' }
        '404': { $ref: '#/components/responses/ErroIndisponivel' }

  /publico/excursoes/{codigo}/mapa-poltronas:
    get:
      summary: Mapa de poltronas público (H3.2) — PÚBLICO
      description: >
        Estados REDUZIDOS: livre · ocupada · bloqueada. O público NUNCA vê
        pendente/pago nem nome de passageiro — só o que precisa para escolher
        poltrona livre. Mesmo `layout.fileiras` de
        `bookings.yaml#/components/schemas/MapaPoltronas` (reaproveita o
        layout do veículo); a diferença é só no detalhe por poltrona.
      security: []
      parameters:
        - { name: codigo, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MapaPoltronasPublico' }
        '404': { $ref: '#/components/responses/ErroIndisponivel' }

  /publico/excursoes/{codigo}/reservas:
    post:
      summary: Reserva do passageiro pelo link (H3.2) — PÚBLICO
      description: >
        Zero conta, zero senha: poltrona + nome + WhatsApp (CPF opcional) +
        escolha sinal/integral. A reserva nasce `pendente` com origem
        `pagina_publica` e reaproveita o MESMO núcleo transacional do
        cadastro rápido do organizador (H1.9) — poltrona única (UNIQUE no
        banco), cálculo de expiração e projeção `publicada → lotada` são
        UMA implementação só, nunca duplicada (ver ADR 008).


        DECISÃO DE SEGURANÇA: este corpo NÃO aceita `valor_centavos` nem
        `forma_pagamento` (campos que só existem no cadastro do organizador,
        `POST /excursoes/{excursaoId}/reservas` em `bookings.yaml`) — o
        servidor calcula `valor_centavos` a partir de
        `excursao.preco_centavos` + `sinal_tipo`/`sinal_valor` quando
        `tipo_pagamento = sinal`, ou do preço integral quando `integral`.
        Um passageiro nunca pode informar o próprio valor a pagar.


        Retorna a cobrança PIX quando a organização tem PIX ativo
        (`configuracao_pix.ativo = true`) — implementação do
        billing-specialist, fora deste contrato de reserva. Sem PIX
        configurado (decisão 006), a reserva é criada normalmente com
        `cobranca: null` e instruções para combinar o pagamento com o
        organizador pelo WhatsApp.
      security: []
      parameters:
        - { name: codigo, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [poltrona, nome, whatsapp, tipo_pagamento]
              properties:
                poltrona: { type: integer, minimum: 1 }
                nome: { type: string, maxLength: 120 }
                whatsapp: { type: string, description: 'Aceita DDD+número; normalizado para E.164 no servidor (mesma regra do cadastro rápido, whatsapp.util.ts).' }
                cpf: { type: [string, 'null'] }
                tipo_pagamento: { type: string, enum: [sinal, integral] }
                ponto_embarque_id:
                  type: [string, 'null']
                  format: uuid
                  description: >
                    Aceito e validado (precisa pertencer à excursão), mas
                    INALCANÇÁVEL pela UI pública nesta fase: o GET público
                    não expõe os ids dos pontos de embarque (adendo do ADR
                    008, 16/07/2026). O frontend público envia sempre null;
                    o organizador registra o ponto ao confirmar a reserva
                    (PATCH autenticado). Expor os ids e adicionar a escolha
                    no formulário é melhoria planejada da próxima iteração.
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReservaPublicaCriada' }
        '404': { $ref: '#/components/responses/ErroIndisponivel' }
        '409':
          description: >
            `poltrona_ocupada` (constraint no banco; detalhes.poltronas_livres
            sugere alternativas — é também a resposta natural quando a
            excursão está `lotada`: toda poltrona válida já está ocupada) |
            `poltrona_bloqueada` | `poltrona_inexistente` |
            `excursao_nao_aceita_reserva` (excursão `rascunho`, `cancelada`
            ou `concluida` — não deveria ocorrer via link público, já que
            essas excursões respondem 404 antes de chegar aqui, mas o
            service valida de novo por defesa em profundidade).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Erro' }
        '422': { $ref: '#/components/responses/ErroValidacao' }
        '429': { $ref: '#/components/responses/ErroMuitasTentativas' }

  /publico/reservas/{reservaId}:
    get:
      summary: Situação da reserva para o passageiro — PÚBLICO
      description: >
        O UUID v7 da reserva funciona como token de posse (não enumerável;
        só quem reservou recebeu o link) — mesmo padrão de
        `redefinir-senha` em identity: resolve a organização a partir da
        PRÓPRIA linha da reserva, nunca de contexto ambiente. Retorna o
        MÍNIMO: status, poltrona, prazo e instruções de pagamento — não
        expõe outras reservas da mesma excursão. Usado pela tela de
        confirmação (polling curto até o webhook do PIX confirmar, quando a
        organização tem PIX ativo).
      security: []
      parameters:
        - { name: reservaId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SituacaoReservaPublica' }
        '404': { $ref: '#/components/responses/ErroNaoEncontrado' }
        '429': { $ref: '#/components/responses/ErroMuitasTentativas' }

  /webhooks/pix/{provedor}:
    post:
      summary: Webhook PIX do provedor (H2.3) — PÚBLICO, processado pelo billing
      description: >
        Fluxo (skill pix-cobranca): valida assinatura/origem → grava evento
        BRUTO (`webhook_evento`) → processa idempotente por estado-alvo.
        Idempotência: o mesmo evento entregue 2+ vezes produz exatamente 1
        mudança de estado (UNIQUE no id do evento do provedor).
        txid desconhecido: registra + alerta e responde 200 (não fazer o
        provedor re-tentar para sempre). Assinatura inválida: 401, registrado,
        NUNCA altera estado. Falha de processamento não perde o evento —
        cron de reprocessamento (sem SQS).
      security: []
      parameters:
        - name: provedor
          in: path
          required: true
          schema: { type: string, enum: [mercado_pago, efi, asaas] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Payload bruto do provedor — gravado como recebido.
              additionalProperties: true
      responses:
        '200':
          description: Evento aceito (inclusive txid desconhecido).
        '401':
          description: Assinatura/origem inválida — rejeitado e registrado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Erro' }

components:
  responses:
    ErroIndisponivel:
      description: >
        Excursão inexistente, de outra organização ou fora de
        `publicada`/`lotada` (codigo `excursao_indisponivel`) — mesma
        resposta para "não existe" e "existe mas não está publicada", para
        não dar sinal de enumeração sobre `codigo_publico`s alheios.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Erro' }
    ErroNaoEncontrado:
      description: Reserva inexistente para este `reservaId` (codigo `nao_encontrado`).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Erro' }
    ErroValidacao:
      description: Corpo inválido (codigo `validacao`).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Erro' }
    ErroMuitasTentativas:
      description: Rate limit por IP excedido (codigo `muitas_tentativas`, header `Retry-After`).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Erro' }

  schemas:
    Erro:
      type: object
      required: [erro]
      properties:
        erro:
          type: object
          required: [codigo, mensagem]
          properties:
            codigo: { type: string }
            mensagem: { type: string }
            detalhes: { type: object, additionalProperties: true }

    ExcursaoPublica:
      type: object
      description: >
        Tudo que o passageiro precisa — e NADA de outros passageiros. Campos
        nomeados como em `ExcursaoCard`/`Excursao` (`excursions.yaml`): mesmo
        `vagas`/`capacidade` calculado (nunca de coluna), para o frontend
        reaproveitar o mesmo componente de exibição de vagas.
      required: [codigo, destino, data_saida, data_retorno, tipo, preco_centavos, sinal_centavos, vagas, capacidade, aceita_reserva, pontos_embarque]
      properties:
        codigo: { type: string }
        destino: { type: string }
        evento_ancora: { type: [string, 'null'] }
        data_saida: { type: string, format: date-time }
        data_retorno: { type: string, format: date-time }
        tipo: { type: string, enum: [bate_volta, pernoite] }
        preco_centavos: { type: integer }
        sinal_centavos: { type: integer, description: Valor do sinal resolvido em centavos. }
        descricao: { type: [string, 'null'] }
        fotos:
          type: array
          items: { type: string, description: URL da foto. }
        vagas: { type: integer, description: SEMPRE calculado (capacidade − reservas ativas), nunca de coluna. }
        capacidade: { type: integer }
        aceita_reserva:
          type: boolean
          description: >
            false quando `vagas = 0` (status `lotada`) — desabilita a
            reserva na hora (H3.2) sem o front precisar conhecer o enum de
            status da excursão.
        organizacao_nome: { type: string }
        pontos_embarque:
          type: array
          description: >
            Informativo (local/horário/ordem). Intencionalmente SEM `id`
            nesta fase — adendo do ADR 008 (16/07/2026): sem id exposto, o
            passageiro não escolhe ponto na reserva pública; o organizador
            registra na confirmação.
          items:
            type: object
            required: [local, horario, ordem]
            properties:
              local: { type: string }
              horario: { type: string, format: date-time }
              ordem: { type: integer }

    MapaPoltronasPublico:
      type: object
      required: [layout, poltronas]
      properties:
        layout:
          type: object
          required: [fileiras]
          properties:
            fileiras:
              type: array
              items:
                type: array
                items:
                  oneOf: [{ type: integer }, { type: 'null' }]
        poltronas:
          type: array
          items:
            type: object
            required: [numero, estado]
            properties:
              numero: { type: integer }
              estado:
                type: string
                enum: [livre, ocupada, bloqueada]
                description: Estados reduzidos — sem pendente/pago, sem nomes.

    CobrancaPublica:
      type: object
      required: [valor_centavos, tipo, copia_e_cola, qr_code_base64, expira_em]
      properties:
        valor_centavos: { type: integer }
        tipo: { type: string, enum: [sinal, integral] }
        copia_e_cola: { type: string }
        qr_code_base64: { type: string }
        expira_em: { type: string, format: date-time }

    ReservaPublicaCriada:
      type: object
      required: [reserva_id, poltrona, status_pagamento, expira_em, instrucoes]
      properties:
        reserva_id:
          type: string
          format: uuid
          description: Guarde — é o link de acompanhamento do passageiro.
        poltrona: { type: integer }
        status_pagamento: { type: string, enum: [pendente] }
        expira_em: { type: [string, 'null'], format: date-time }
        cobranca:
          oneOf:
            - { $ref: '#/components/schemas/CobrancaPublica' }
            - { type: 'null' }
        instrucoes:
          type: string
          description: 'Prazo em linguagem humana, pt-BR informal. Ex.: "Sua poltrona tá guardada até sábado às 18h — é só pagar o sinal pra confirmar."'

    SituacaoReservaPublica:
      type: object
      required: [reserva_id, poltrona, status, status_pagamento, destino, data_saida]
      properties:
        reserva_id: { type: string, format: uuid }
        poltrona: { type: integer }
        status: { type: string, enum: [ativa, embarcada, expirada, cancelada] }
        status_pagamento: { type: string, enum: [pendente, sinal_pago, pago, cancelado] }
        destino: { type: string }
        data_saida: { type: string, format: date-time }
        expira_em: { type: [string, 'null'], format: date-time }
        cobranca:
          oneOf:
            - { $ref: '#/components/schemas/CobrancaPublica' }
            - { type: 'null' }
        instrucoes: { type: [string, 'null'] }
