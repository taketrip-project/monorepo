name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: lint, test e build (api + web)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taketrip
          POSTGRES_PASSWORD: taketrip
          POSTGRES_DB: taketrip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taketrip -d taketrip_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://taketrip:taketrip@localhost:5432/taketrip_test
      DATABASE_URL_TEST: postgres://taketrip:taketrip@localhost:5432/taketrip_test
      # Módulo identity (ADR 004): obrigatório para assinar/validar o JWT —
      # sem `.env` no CI (gitignored), precisa vir daqui. SES_*/APP_URL são
      # opcionais (o EmailService real vira log sem eles — ver notifications).
      JWT_SECRET: ci-test-secret-nao-usar-em-producao

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint (api + web)
        run: npm run lint

      - name: Aplicar migrations na base de teste
        run: npm run db:migrate -w apps/api

      - name: Testes unitários (api + web)
        run: npm run test

      - name: Testes de integração (api, Postgres real)
        run: npm run test:integration

      - name: Build (api + web)
        run: npm run build
